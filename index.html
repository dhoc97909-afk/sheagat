<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת מבזקים - ניהול פרופילים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/js/all.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
    body { font-family: 'Assistant', sans-serif; background-color: #f3f4f6; }
    .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    .rich-editor:empty:before { content: attr(placeholder); color: #9ca3af; }
    
    .google-chat-card {
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 16px;
        padding: 16px;
        max-width: 500px;
        width: 100%;
        transition: all 0.3s ease;
    }
    .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
    }
    .chat-title-area { text-align: right; flex-grow: 1; }
    .chat-main-title { font-size: 20px; font-weight: 700; color: #1f2937; margin-bottom: 2px; }
    .chat-subtitle { font-size: 14px; color: #4b5563; }
    .chat-logo { width: 45px; height: 45px; object-fit: contain; margin-right: 12px; border-radius: 50%; }
    .chat-divider { border-top: 1px solid #f3f4f6; margin: 12px 0; }
    .chat-body { font-size: 16px; line-height: 1.5; color: #374151; white-space: pre-wrap; }
    
    .profile-btn.active { border-color: #2563eb; background-color: #eff6ff; border-width: 2px; }

    /* Animations */
    .modal-enter { animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .editor-drag-over {
        border-color: #2563eb !important;
        background-color: #eff6ff !important;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }
    .editor-drag-over::after {
        content: '📸 שחרר להעלאה';
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        inset: 0;
        background: rgba(239,246,255,0.92);
        border-radius: 8px;
        font-size: 18px;
        font-weight: 700;
        color: #2563eb;
        pointer-events: none;
    }
    #editor { position: relative; }

    /* Upload progress modal */
    .upload-progress-bar {
        height: 8px;
        border-radius: 99px;
        background: #e5e7eb;
        overflow: hidden;
        margin-top: 12px;
    }
    .upload-progress-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        transition: width 0.3s ease;
        width: 0%;
    }
  </style>
</head>
<body class="p-4 md:p-8">

    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/60 backdrop-blur-md p-4">
        <div class="bg-white rounded-[32px] p-8 max-w-sm w-full card-shadow modal-enter text-center">
            <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl animate-pulse">
                <i class="fas fa-bolt"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">רגע, זה חירום?</h3>
            <p class="text-gray-500 mb-8 leading-relaxed">זיהינו מילות מפתח של "צבע אדום". האם תרצה לשלוח את זה תחת פרופיל החירום?</p>
            
            <div class="flex flex-col gap-3">
                <button onclick="handleModalChoice('switch')" class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl hover:bg-red-700 transition shadow-lg shadow-red-200 flex items-center justify-center gap-2">
                    <i class="fas fa-exchange-alt"></i> כן, החלף ושלח עכשיו
                </button>
                <button onclick="handleModalChoice('continue')" class="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-black transition shadow-lg">
                    שלח כמבזק רגיל בכל זאת
                </button>
                <button onclick="handleModalChoice('cancel')" class="w-full py-3 text-gray-500 font-semibold hover:text-gray-800 transition mt-2">
                    ביטול וחזרה לעריכה
                </button>
            </div>
        </div>
    </div>

    <div id="statusOverlay" class="fixed inset-0 z-[60] flex items-center justify-center hidden bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[32px] p-8 max-w-xs w-full card-shadow modal-enter text-center">
            <div id="statusIcon" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                </div>
            <h3 id="statusTitle" class="text-xl font-bold text-gray-800 mb-2">שולח...</h3>
            <p id="statusDesc" class="text-gray-500 mb-6"></p>
            <div id="countdownAction" class="hidden">
                <button onclick="cancelSend()" class="w-full bg-red-50 text-red-600 font-bold py-3 rounded-2xl hover:bg-red-100 transition border border-red-100">
                    ביטול שליחה
                </button>
            </div>
        </div>
    </div>

    <input type="hidden" id="imgbbApiKey" value="74b5db34f7d743e270990275f1afd0ee">
    <input type="hidden" id="googleClientId" value="856723702772-jm929ihp29ovhribfaaph17pbaq6qr3n.apps.googleusercontent.com">

    <div id="uploadProgressModal" class="fixed inset-0 z-[70] flex items-center justify-center hidden bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[32px] p-8 max-w-xs w-full card-shadow modal-enter text-center">
            <div id="uploadModalIcon" class="w-20 h-20 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mx-auto mb-4 text-3xl">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <h3 id="uploadModalTitle" class="text-xl font-bold text-gray-800 mb-1">מעלה תמונה...</h3>
            <p id="uploadModalDesc" class="text-gray-400 text-sm mb-2">אנא המתן</p>
            <div class="upload-progress-bar">
                <div id="uploadProgressFill" class="upload-progress-fill"></div>
            </div>
        </div>
    </div>


    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="space-y-6">
        <div class="bg-white p-6 rounded-2xl card-shadow">
          <h2 class="text-lg font-bold mb-3 text-gray-700">בחר פרופיל שליחה:</h2>
          <div class="grid grid-cols-2 gap-3 mb-6">
              <button onclick="setProfile('news')" id="btn-news" class="profile-btn active border p-3 rounded-xl flex items-center gap-3 transition">
                  <img src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png" class="w-10 h-10 rounded-full border">
                  <span class="font-bold text-sm">מבזק חדשות</span>
              </button>
              <button onclick="setProfile('red')" id="btn-red" class="profile-btn border p-3 rounded-xl flex items-center gap-3 transition">
                  <img src="https://i.postimg.cc/ncKKRgq9/image.png" class="w-10 h-10 rounded-full border">
                  <span class="font-bold text-sm text-red-600">צבע אדום</span>
              </button>
          </div>

          <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-blue-800 border-t pt-4">
            <i class="fas fa-edit"></i> עריכת תוכן
          </h2>
          
          <div class="mb-4">
            <div class="flex flex-wrap gap-2 mb-2 border-b pb-2 items-center">
                <button onclick="format('bold')" class="p-2 hover:bg-gray-100 rounded" title="הדגשה"><i class="fas fa-bold"></i></button>
                <button onclick="format('italic')" class="p-2 hover:bg-gray-100 rounded" title="נטוי"><i class="fas fa-italic"></i></button>
        
                <div class="h-6 w-px bg-gray-300 mx-1"></div>
                <button onclick="insertVideoText()" class="bg-red-50 text-red-600 text-xs font-bold px-3 py-1.5 rounded-full border border-red-200 hover:bg-red-100 transition">
                    <i class="fas fa-video ml-1"></i> וידאו בשרשור
                </button>
            </div>
            <div id="editor" class="rich-editor min-h-[120px] p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" contenteditable="true" placeholder="הקלד כאן... (או גרור תמונה/סרטון לכאן)" oninput="syncPreview()" ondragover="handleEditorDragOver(event)" ondragleave="handleEditorDragLeave(event)" ondrop="handleEditorDrop(event)"></div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm font-semibold mb-1">תמונה:</label>
              <div class="flex gap-2 items-center">
                <input type="text" id="newsImgUrl" oninput="syncPreview()" placeholder="https://..." class="flex-1 border p-2 rounded-lg text-sm min-w-0">
                <label id="uploadLabel" class="cursor-pointer bg-blue-100 text-blue-700 font-bold px-3 py-2 rounded-lg hover:bg-blue-200 transition text-sm flex items-center gap-1 whitespace-nowrap" title="העלה תמונה">
                    <i id="uploadBtnIcon" class="fas fa-upload"></i>
                    <span id="uploadBtnText">העלה</span>
                    <input id="uploadBtn" type="file" accept="image/*" class="hidden" onchange="uploadImageToImgbb(this)">
                </label>
              </div>
              <div id="uploadStatus" class="text-xs mt-1 hidden"></div>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">סרטון:</label>
              <div class="flex gap-2 items-center">
                <input type="text" id="videoUrl" oninput="syncPreview()" placeholder="קישור לסרטון..." class="flex-1 border p-2 rounded-lg text-sm min-w-0">
                <label id="videoUploadLabel" class="cursor-pointer bg-purple-100 text-purple-700 font-bold px-3 py-2 rounded-lg hover:bg-purple-200 transition text-sm flex items-center gap-1 whitespace-nowrap" title="העלה סרטון">
                    <i id="videoUploadIcon" class="fas fa-video"></i>
                    <span id="videoUploadText">העלה</span>
                    <input id="videoUploadInput" type="file" accept="video/*" class="hidden" onchange="uploadVideoToCatbox(this)">
                </label>
              </div>
              <div id="videoUploadStatus" class="text-xs mt-1 text-gray-400">מעלה ישירות ל-Google Drive שלך</div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-semibold mb-1">כפתור פעולה:</label>
                <div class="flex gap-1">
                    <input type="text" id="btnText" placeholder="טקסט" class="w-1/2 border p-2 rounded-lg text-sm">
                    <input type="text" id="btnUrl" placeholder="URL" class="w-1/2 border p-2 rounded-lg text-sm">
                </div>
                <button onclick="addButton()" class="w-full mt-2 bg-blue-100 text-blue-700 font-bold py-1 rounded-lg hover:bg-blue-200 transition">הוסף כפתור</button>
            </div>
          </div>

          <div id="buttonsList" class="flex flex-wrap gap-2 mb-6"></div>

          <div id="sendContainer" class="relative">
            <button id="mainSendBtn" onclick="initiateSend()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg flex justify-center items-center gap-2">
                <i class="fas fa-paper-plane"></i> שלח כעת
            </button>
          </div>
        </div>
      </div>

      <div class="flex flex-col items-center">
        <h2 class="text-gray-500 font-bold mb-4 uppercase tracking-wider text-sm">תצוגה מקדימה חיה</h2>
        <div class="google-chat-card card-shadow">
            <div class="chat-header">
                <div class="chat-title-area">
                    <div id="previewTitle" class="chat-main-title">מבזק חדשות</div>
                    <div id="liveTime" class="chat-subtitle">נשלח ב: --:--</div>
                </div>
                <img id="previewLogo" src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png" class="chat-logo">
            </div>
            <div class="chat-divider"></div>
            <div class="chat-body" id="previewText">הקלד כאן...</div>
            <img id="bodyImgPreview" class="w-full h-48 object-cover rounded-lg mt-3 hidden">
            <div id="videoPreview" class="hidden mt-3 bg-gray-900 rounded-lg overflow-hidden">
                <video id="bodyVideoPreview" class="w-full max-h-48 object-contain" controls></video>
                <div class="px-3 py-2 flex items-center gap-2">
                    <i class="fas fa-play-circle text-white text-sm"></i>
                    <span class="text-white text-xs font-bold">▶ סרטון מצורף</span>
                </div>
            </div>
            <div id="previewButtons" class="mt-4 flex flex-col gap-2"></div>
        </div>
      </div>
    </div>

<script>
    // הוובהוקים המעודכנים לכל פרופיל
    const profiles = {
        news: { 
            title: "מבזק חדשות", 
            logo: "https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png",
            webhooks: [
                "https://chat.googleapis.com/v1/spaces/AAQAgdDJy_E/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=k6LukOYY3oUIjWAbwOJvd6HBFoWTS_RsbsrFG-2ZG0c",
                "https://chat.googleapis.com/v1/spaces/AAQAGhxWZZM/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=yMlu8Oyx9HRkBeWGXCvkUtHjCr57EyyVKAm5CariuvI"
            ]
        },
        red: { 
            title: "צבע אדום", 
            logo: "https://i.postimg.cc/ncKKRgq9/image.png",
            webhooks: [
                "https://chat.googleapis.com/v1/spaces/AAQAgdDJy_E/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=k6LukOYY3oUIjWAbwOJvd6HBFoWTS_RsbsrFG-2ZG0c",
                "https://chat.googleapis.com/v1/spaces/AAQAGhxWZZM/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=IZg6yXQqGqRyXvBE26DX6t_E6IGJnKZoDokjzyjmY2E"
            ]
        }
    };

    let currentProfile = 'news';
    let buttons = [];
    let countdownInterval = null;

    function setProfile(profileKey) {
        currentProfile = profileKey;
        document.querySelectorAll('.profile-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${profileKey}`).classList.add('active');
        document.getElementById('previewTitle').textContent = profiles[profileKey].title;
        document.getElementById('previewLogo').src = profiles[profileKey].logo;
        document.getElementById('previewTitle').style.color = profileKey === 'red' ? '#dc2626' : '#1f2937';
        syncPreview();
    }

    function format(cmd, val = null) { document.execCommand(cmd, false, val); syncPreview(); }

    function insertVideoText() {
        const editor = document.getElementById('editor');
        editor.focus();
        document.execCommand('insertHTML', false, '<br>וידאו בשרשור>>>');
        syncPreview();
    }

    function getCurrentTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }

    function syncPreview() {
        const content = document.getElementById('editor').innerHTML;
        document.getElementById('previewText').innerHTML = content || "הקלד כאן...";
        const imgUrl = document.getElementById('newsImgUrl').value;
        const imgEl = document.getElementById('bodyImgPreview');
        if(imgUrl) { imgEl.src = imgUrl; imgEl.classList.remove('hidden'); }
        else { imgEl.classList.add('hidden'); }

        const videoUrl = document.getElementById('videoUrl').value;
        const videoWrap = document.getElementById('videoPreview');
        const videoEl = document.getElementById('bodyVideoPreview');
        if (videoUrl) {
            videoEl.src = videoUrl;
            videoWrap.classList.remove('hidden');
        } else {
            videoWrap.classList.add('hidden');
            videoEl.src = '';
        }

        document.getElementById('liveTime').textContent = "נשלח ב: " + getCurrentTime();
    }

    function addButton() {
        const text = document.getElementById('btnText').value;
        const url = document.getElementById('btnUrl').value;
        if (text && url) {
            buttons.push({ id: Date.now(), text, url });
            document.getElementById('btnText').value = '';
            document.getElementById('btnUrl').value = '';
            renderButtons();
        }
    }

    function removeButton(id) {
        buttons = buttons.filter(b => b.id !== id);
        renderButtons();
    }

    function renderButtons() {
        document.getElementById('buttonsList').innerHTML = buttons.map(b => `
            <div class="flex items-center gap-2 bg-gray-200 px-3 py-1 rounded-full text-xs">
                <span>${b.text}</span>
                <button onclick="removeButton(${b.id})" class="text-red-500"><i class="fas fa-times"></i></button>
            </div>
        `).join('');
        document.getElementById('previewButtons').innerHTML = buttons.map(b => `
            <div class="w-full text-center py-2 border border-blue-200 rounded-lg text-sm font-bold text-blue-700 bg-blue-50">${b.text}</div>
        `).join('');
    }

    function initiateSend() {
        const content = document.getElementById('editor').innerText;
        const emergencyKeywords = ["צבע אדום", "התרעה", "התרעת חירום", "אזעקה", "מרחב מוגן", "ירי רקטות", "חדירת מחבלים", "חשש לאירוע", "נפילה"];
        const hasKeyword = emergencyKeywords.some(word => content.includes(word));

        if (currentProfile === 'news' && hasKeyword) {
            document.getElementById('customModal').classList.remove('hidden');
            return;
        }

        if (currentProfile === 'red' && !hasKeyword) {
            showPrettyStatus("שגיאה", "נא להוסיף מילות חירום", "bg-red-100 text-red-600", "fa-times-circle");
            setTimeout(hidePrettyStatus, 2000);
            return; 
        }

        startCountdown();
    }

    function handleModalChoice(choice) {
        document.getElementById('customModal').classList.add('hidden');
        if (choice === 'switch') {
            setProfile('red');
            startCountdown();
        } else if (choice === 'continue') {
            startCountdown();
        }
    }

    function startCountdown() {
        const overlay = document.getElementById('statusOverlay');
        const title = document.getElementById('statusTitle');
        const desc = document.getElementById('statusDesc');
        const iconWrap = document.getElementById('statusIcon');
        const action = document.getElementById('countdownAction');

        overlay.classList.remove('hidden');
        action.classList.remove('hidden');
        iconWrap.className = "w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl bg-blue-100 text-blue-600";
        iconWrap.innerHTML = '<i class="fas fa-clock animate-spin"></i>';
        
        let timeLeft = 2;
        title.textContent = "מכין שליחה...";
        desc.textContent = `ההודעה תישלח בעוד ${timeLeft} שניות ל-2 קבוצות`;

        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                desc.textContent = `ההודעה תישלח בעוד ${timeLeft} שניות ל-2 קבוצות`;
            } else {
                clearInterval(countdownInterval);
                action.classList.add('hidden');
                executeActualSend();
            }
        }, 1000);
    }

    function cancelSend() {
        clearInterval(countdownInterval);
        hidePrettyStatus();
        showPrettyStatus("בוטל", "השליחה נעצרה", "bg-gray-100 text-gray-600", "fa-undo");
        setTimeout(hidePrettyStatus, 1500);
    }

    async function executeActualSend() {
        const title = document.getElementById('statusTitle');
        const desc = document.getElementById('statusDesc');
        const iconWrap = document.getElementById('statusIcon');
        
        title.textContent = "שולח כעת...";
        desc.textContent = "שולח ל-2 הוובהוקים במקביל...";

        const content = document.getElementById('editor').innerHTML;
        const imgUrl = document.getElementById('newsImgUrl').value;
        const videoUrl = document.getElementById('videoUrl').value;
        const sendTime = getCurrentTime();
        const profile = profiles[currentProfile];
        
        let formattedText = content.replace(/<div>/g, '\n').replace(/<\/div>/g, '').replace(/<br>/g, '\n').replace(/&nbsp;/g, ' ');

        const widgets = [{ textParagraph: { text: formattedText } }];
        if(imgUrl) { widgets.push({ image: { imageUrl: imgUrl } }); }
        if(videoUrl) {
            widgets.push({ buttonList: { buttons: [{ text: '▶ צפה בסרטון', onClick: { openLink: { url: videoUrl } }, color: { red: 0.29, green: 0.14, blue: 0.69, alpha: 1 } }] } });
        }
        if(buttons.length > 0) {
            widgets.push({ buttonList: { buttons: buttons.map(b => ({ text: b.text, onClick: { openLink: { url: b.url } } })) } });
        }

        const payload = { 
            cardsV2: [{ 
                card: { 
                    header: { 
                        title: profile.title, 
                        subtitle: "נשלח ב: " + sendTime, 
                        imageUrl: profile.logo, 
                        imageType: "CIRCLE" 
                    },
                    sections: [{ widgets }] 
                } 
            }] 
        };

        try {
            // שליחה לכל הוובהוקים במקביל
            const sendPromises = profile.webhooks.map(url => 
                fetch(url, { method: 'POST', body: JSON.stringify(payload) })
            );

            const results = await Promise.all(sendPromises);
            const allOk = results.every(res => res.ok);

            if (allOk) { 
                iconWrap.className = "w-20 h-20 rounded-full bg-green-100 text-green-600 flex items-center justify-center mx-auto mb-4 text-3xl";
                iconWrap.innerHTML = '<i class="fas fa-check-double"></i>';
                title.textContent = "נשלח בהצלחה!";
                desc.textContent = "ההודעה פורסמה ב-2 קבוצות היעד";
                
                document.getElementById('editor').innerHTML = "";
                document.getElementById('newsImgUrl').value = "";
                document.getElementById('videoUrl').value = "";
                buttons = [];
                renderButtons();
                syncPreview();
                
                setTimeout(hidePrettyStatus, 2500);
            } else {
                throw new Error("חלק מהשליחות נכשלו");
            }
        } catch (e) { 
            showPrettyStatus("שגיאה", "תקלה בשליחה לאחד או יותר מהוובהוקים", "bg-red-100 text-red-600", "fa-wifi");
            setTimeout(hidePrettyStatus, 3000);
        }
    }

    function showPrettyStatus(title, message, colorClass, icon) {
        const overlay = document.getElementById('statusOverlay');
        const titleEl = document.getElementById('statusTitle');
        const descEl = document.getElementById('statusDesc');
        const iconWrap = document.getElementById('statusIcon');
        const action = document.getElementById('countdownAction');

        overlay.classList.remove('hidden');
        action.classList.add('hidden');
        iconWrap.className = `w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl ${colorClass}`;
        iconWrap.innerHTML = `<i class="fas ${icon}"></i>`;
        titleEl.textContent = title;
        descEl.textContent = message;
    }

    function hidePrettyStatus() {
        document.getElementById('statusOverlay').classList.add('hidden');
    }

    // ── Upload modal helpers (uses statusOverlay) ─────────────────────
    function showUploadModal(title, desc, progress, iconClass, iconColor) {
        const overlay = document.getElementById('statusOverlay');
        document.getElementById('statusTitle').textContent = title;
        document.getElementById('statusDesc').textContent = desc;
        document.getElementById('countdownAction').classList.add('hidden');
        const iconWrap = document.getElementById('statusIcon');
        iconWrap.className = `w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl ${iconColor}`;
        iconWrap.innerHTML = `<i class="${iconClass}"></i>`;

        // progress bar
        let bar = document.getElementById('uploadInlineBar');
        if (!bar) {
            bar = document.createElement('div');
            bar.id = 'uploadInlineBar';
            bar.className = 'upload-progress-bar mt-2';
            bar.innerHTML = '<div id="uploadInlineFill" class="upload-progress-fill"></div>';
            overlay.querySelector('.bg-white').appendChild(bar);
        }
        bar.style.display = progress >= 0 ? 'block' : 'none';
        document.getElementById('uploadInlineFill').style.width = progress + '%';
        overlay.classList.remove('hidden');
    }
    function hideUploadModal() {
        document.getElementById('statusOverlay').classList.add('hidden');
        const bar = document.getElementById('uploadInlineBar');
        if (bar) { bar.style.display = 'none'; document.getElementById('uploadInlineFill').style.width = '0%'; }
    }

    // ── Drag & drop on editor ─────────────────────────────────────────
    function handleEditorDragOver(e) {
        e.preventDefault();
        const hasMedia = [...(e.dataTransfer.items || [])].some(i => i.kind === 'file' && (i.type.startsWith('image/') || i.type.startsWith('video/')));
        if (hasMedia) {
            e.dataTransfer.dropEffect = 'copy';
            e.currentTarget.classList.add('editor-drag-over');
        }
    }
    function handleEditorDragLeave(e) {
        if (!e.currentTarget.contains(e.relatedTarget)) {
            e.currentTarget.classList.remove('editor-drag-over');
        }
    }
    function handleEditorDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('editor-drag-over');
        const files = [...(e.dataTransfer.files || [])];
        const imgFile = files.find(f => f.type.startsWith('image/'));
        const vidFile = files.find(f => f.type.startsWith('video/'));
        if (imgFile) uploadImageFile(imgFile);
        else if (vidFile) uploadVideoFile(vidFile);
    }

    // ── Upload from file input (image) ────────────────────────────────
    async function uploadImageToImgbb(input) {
        const file = input.files[0];
        if (!file) return;
        input.value = '';
        await uploadImageFile(file);
    }

    // ── Upload from file input (video) ────────────────────────────────
    async function uploadVideoToCatbox(input) {
        const file = input.files[0];
        if (!file) return;
        input.value = '';
        await uploadVideoFile(file);
    }

    // ── Google Drive upload ───────────────────────────────────────────
    let driveAccessToken = null;

    function getDriveToken() {
        return new Promise((resolve, reject) => {
            if (driveAccessToken) { resolve(driveAccessToken); return; }
            const clientId = document.getElementById('googleClientId').value.trim();
            if (!clientId || clientId === 'YOUR_CLIENT_ID_HERE') {
                reject(new Error('נא להגדיר Google Client ID בקובץ'));
                return;
            }
            const client = google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (resp) => {
                    if (resp.error) { reject(new Error(resp.error)); return; }
                    driveAccessToken = resp.access_token;
                    resolve(driveAccessToken);
                }
            });
            client.requestAccessToken();
        });
    }

    async function uploadVideoFile(file) {
        const maxMB = 1024;
        if (file.size > maxMB * 1024 * 1024) {
            showUploadModal('קובץ גדול מדי', `המקסימום הוא ${maxMB}MB`, 0, 'fas fa-times-circle', 'bg-red-100 text-red-600');
            setTimeout(hideUploadModal, 2500);
            return;
        }

        showUploadModal('מחבר ל-Google...', 'נא אשר גישה בחלון שנפתח', 5, 'fab fa-google', 'bg-blue-100 text-blue-600');

        let token;
        try {
            token = await getDriveToken();
        } catch (e) {
            showUploadModal('שגיאת כניסה', e.message, 0, 'fas fa-times-circle', 'bg-red-100 text-red-600');
            setTimeout(hideUploadModal, 3000);
            return;
        }

        showUploadModal('מעלה לDrive...', file.name, 20, 'fas fa-cloud-upload-alt animate-bounce', 'bg-blue-100 text-blue-600');

        try {
            // 1. Upload file
            const metadata = { name: file.name, mimeType: file.type };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', file);

            const uploadRes = await fetch(
                'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
                { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form }
            );
            if (!uploadRes.ok) throw new Error(`שגיאת העלאה: ${uploadRes.status}`);
            const { id } = await uploadRes.json();

            showUploadModal('מגדיר הרשאות...', 'מכין קישור לצפייה', 75, 'fas fa-lock-open', 'bg-blue-100 text-blue-600');

            // 2. Make public
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}/permissions`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'reader', type: 'anyone' })
            });

            const viewUrl = `https://drive.google.com/file/d/${id}/view`;
            document.getElementById('videoUrl').value = viewUrl;
            syncPreview();
            showUploadModal('הועלה בהצלחה! 🎉', 'הסרטון זמין ב-Google Drive', 100, 'fas fa-check-double', 'bg-green-100 text-green-600');
            setTimeout(hideUploadModal, 3000);

        } catch (e) {
            if (e.message.includes('401')) driveAccessToken = null;
            showUploadModal('העלאה נכשלה', e.message, 0, 'fas fa-wifi', 'bg-red-100 text-red-600');
            setTimeout(hideUploadModal, 3000);
        }
    }

    // ── Core upload logic ─────────────────────────────────────────────
    async function uploadImageFile(file) {
        const apiKey = document.getElementById('imgbbApiKey').value.trim();

        if (!apiKey) {
            showUploadModal('שגיאה', 'מפתח API חסר', 0, 'fas fa-times-circle', 'bg-red-100 text-red-600');
            setTimeout(hideUploadModal, 2000);
            return;
        }

        showUploadModal('מכין תמונה...', file.name, 10, 'fas fa-image', 'bg-blue-100 text-blue-600');

        try {
            const base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            showUploadModal('מעלה לשרת...', 'שולח לimgbb', 50, 'fas fa-cloud-upload-alt animate-bounce', 'bg-blue-100 text-blue-600');

            const formData = new FormData();
            formData.append('key', apiKey);
            formData.append('image', base64);

            const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });

            showUploadModal('מעבד תגובה...', 'כמעט סיימנו', 85, 'fas fa-cog fa-spin', 'bg-blue-100 text-blue-600');

            const data = await res.json();

            if (data.success) {
                document.getElementById('newsImgUrl').value = data.data.url;
                syncPreview();
                showUploadModal('הועלה בהצלחה!', data.data.url.substring(0, 40) + '...', 100, 'fas fa-check-double', 'bg-green-100 text-green-600');
                setTimeout(hideUploadModal, 2000);
            } else {
                throw new Error(data.error?.message || 'שגיאה לא ידועה');
            }
        } catch (e) {
            showUploadModal('העלאה נכשלה', e.message, 0, 'fas fa-wifi', 'bg-red-100 text-red-600');
            setTimeout(hideUploadModal, 3000);
        }
    }

    syncPreview();
</script>
